spring.application.name=payment-api
spring.datasource.url=jdbc:h2:mem:paymentdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
config.check.message=Payment API standalone test config
config.check.mode=test
server.port=0
